version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ioms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ioms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ioms_password}
      POSTGRES_DB: ${POSTGRES_DB:-ioms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ioms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ioms_user} -d ${POSTGRES_DB:-ioms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ioms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ioms_user}:${POSTGRES_PASSWORD:-ioms_password}@postgres:5432/${POSTGRES_DB:-ioms_db}
      APP_NAME: IOMS
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production-please}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ioms_network
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: ioms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ioms_network

volumes:
  postgres_data:
    name: ioms_postgres_data

networks:
  ioms_network:
    name: ioms_network
    driver: bridge
